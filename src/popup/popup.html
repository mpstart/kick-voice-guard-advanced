<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kick Voice Guard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        :root { --bg: #0f0f17; --card: #1a1a24; --accent: #00ff9d; --text: #e0e0ff; --muted: #8a8aa0; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); width: 380px; padding: 16px; }
        .header { display:flex; align-items:center; gap:12px; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid #333340; }
        .logo { width:42px; height:42px; background:linear-gradient(135deg,#00ff9d,#00cc7a); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px; color:#000; box-shadow:0 0 20px rgba(0,255,157,.4); }
        h1 { font-size:22px; font-weight:600; }
        .status { display:flex; align-items:center; gap:8px; font-size:14px; margin-bottom:20px; }
        .dot { width:10px; height:10px; border-radius:50%; background:#22c55e; box-shadow:0 0 8px #22c55e; animation:pulse 2s infinite; }
        .card { background:var(--card); border-radius:16px; padding:20px; margin-bottom:16px; border:1px solid #333340; }
        label { display:block; font-size:13px; font-weight:500; color:var(--muted); margin-bottom:8px; }
        select, input[type="range"] { width:100%; background:#25252f; border:1px solid #444456; border-radius:10px; padding:12px 14px; color:var(--text); font-size:15px; }
        .slider-container { display:flex; align-items:center; gap:12px; }
        .value { font-family:monospace; font-size:15px; min-width:42px; text-align:right; }
        .toggle { display:flex; align-items:center; justify-content:space-between; background:#25252f; border-radius:9999px; padding:4px; width:100%; }
        .toggle-btn { flex:1; padding:10px 20px; text-align:center; border-radius:9999px; font-weight:600; font-size:14px; cursor:pointer; transition:all .2s; }
        .toggle-btn.active { background:var(--accent); color:#000; box-shadow:0 4px 12px rgba(0,255,157,.3); }
        .samples { max-height:240px; overflow-y:auto; }
        .sample-item { display:flex; justify-content:space-between; align-items:center; padding:12px; background:#25252f; border-radius:12px; margin-bottom:8px; font-size:14px; }
        .btn { background:var(--accent); color:#000; border:none; padding:12px 20px; border-radius:9999px; font-weight:600; font-size:14px; cursor:pointer; width:100%; margin-top:8px; transition:all .2s; }
        .btn:hover { transform:translateY(-1px); box-shadow:0 8px 20px rgba(0,255,157,.4); }
        .btn-secondary { background:transparent; border:2px solid #444456; color:var(--text); }
        .indicator { padding:12px; background:#1a1a24; border-radius:12px; text-align:center; font-weight:600; font-size:15px; display:flex; align-items:center; justify-content:center; gap:10px; }
        @keyframes pulse { 0%,100% {opacity:1} 50% {opacity:0.4} }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎤</div>
        <div>
            <h1>Kick Voice Guard</h1>
            <p style="font-size:13px;color:var(--muted);">v2.0 - Anti falsos positivos</p>
        </div>
    </div>

    <div class="status">
        <div class="dot"></div>
        <span id="status-text">Listo • Esperando stream</span>
    </div>

    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <label>Extensión Activada</label>
            <label class="toggle">
                <input type="checkbox" id="enable-toggle" checked style="display:none;">
                <span class="toggle-btn active" id="enable-on">ON</span>
                <span class="toggle-btn" id="enable-off">OFF</span>
            </label>
        </div>

        <label>Modo de Audio</label>
        <div class="toggle" style="margin-bottom:20px;">
            <span class="toggle-btn active" id="mode-mute">FULL MUTE</span>
            <span class="toggle-btn" id="mode-reduce">REDUCCIÓN DE VOZ</span>
        </div>

        <div class="slider-container">
            <label style="flex:1;">Umbral de Confianza</label>
            <input type="range" id="threshold-slider" min="0.5" max="0.95" step="0.01" value="0.85">
            <span class="value" id="threshold-value">0.85</span>
        </div>

        <div class="slider-container">
            <label style="flex:1;">Sensibilidad</label>
            <input type="range" id="sensitivity-slider" min="0" max="1" step="0.01" value="0.35">
            <span class="value" id="sensitivity-value">0.35</span>
        </div>

        <div id="reduction-container" class="slider-container" style="margin-top:12px;">
            <label style="flex:1;">Reducción de Volumen %</label>
            <input type="range" id="reduction-slider" min="30" max="90" step="5" value="65">
            <span class="value" id="reduction-value">65%</span>
        </div>
    </div>

    <div class="card">
        <label>Muestras de Voz <span id="sample-count" style="font-size:12px;color:var(--muted);">(0)</span></label>
        <div class="samples" id="samples-list"></div>
        
        <input type="file" id="sample-upload" accept="audio/*" multiple style="display:none;">
        <button class="btn" id="add-sample-btn">
            + Agregar Muestra de Voz (MP3/WAV)
        </button>
        <button class="btn btn-secondary" id="clear-samples" style="margin-top:8px;">
            Borrar Todas las Muestras
        </button>
    </div>

    <div class="card">
        <div class="indicator" id="live-indicator">
            <span id="detection-status">🔴 No se detectó voz objetivo</span>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
